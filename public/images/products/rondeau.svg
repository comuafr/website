<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#242424"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="310" rx="105" ry="10" fill="#3a3a3a" opacity="0.3"/>
  <!-- Wooden disc -->
  <circle cx="200" cy="190" r="110" fill="#e0544d"/>
  <!-- Wood grain lines -->
  <path d="M120 150 Q 200 140 280 155" fill="none" stroke="#242424" stroke-width="1.2" opacity="0.25"/>
  <path d="M100 175 Q 200 165 300 180" fill="none" stroke="#242424" stroke-width="1" opacity="0.2"/>
  <path d="M90 200 Q 200 192 310 205" fill="none" stroke="#242424" stroke-width="1.2" opacity="0.25"/>
  <path d="M100 225 Q 200 218 300 230" fill="none" stroke="#242424" stroke-width="1" opacity="0.2"/>
  <path d="M115 250 Q 200 242 285 253" fill="none" stroke="#242424" stroke-width="1.2" opacity="0.25"/>
  <path d="M140 270 Q 200 264 260 272" fill="none" stroke="#242424" stroke-width="1" opacity="0.2"/>
  <!-- Subtle ring growth lines -->
  <circle cx="200" cy="190" r="90" fill="none" stroke="#242424" stroke-width="0.6" opacity="0.12"/>
  <circle cx="200" cy="190" r="65" fill="none" stroke="#242424" stroke-width="0.6" opacity="0.12"/>
  <circle cx="200" cy="190" r="40" fill="none" stroke="#242424" stroke-width="0.6" opacity="0.12"/>
  <!-- Edge bevel highlight -->
  <path d="M110 140 A 110 110 0 0 1 270 120" fill="none" stroke="#f5f5f5" stroke-width="1.5" opacity="0.15"/>
  <!-- Edge thickness (side view hint) -->
  <path d="M90 192 L90 200 Q 200 215 310 200 L310 192" fill="none" stroke="#3a3a3a" stroke-width="1.5" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f5f5f5" opacity="0.6">Rondeau</text>
</svg>