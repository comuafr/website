<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#242424"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="310" rx="90" ry="8" fill="#3a3a3a" opacity="0.3"/>
  <!-- Pedal base (bottom rectangle) -->
  <rect x="115" y="260" width="170" height="40" rx="5" fill="#3a3a3a"/>
  <!-- Pedal top surface (angled) -->
  <path d="M120 170 L280 200 L280 260 L120 260 Z" fill="#e0544d"/>
  <!-- Surface grip lines -->
  <line x1="145" y1="185" x2="145" y2="255" stroke="#242424" stroke-width="1.5" opacity="0.25"/>
  <line x1="170" y1="180" x2="170" y2="255" stroke="#242424" stroke-width="1.5" opacity="0.25"/>
  <line x1="195" y1="195" x2="195" y2="255" stroke="#242424" stroke-width="1.5" opacity="0.25"/>
  <line x1="220" y1="200" x2="220" y2="255" stroke="#242424" stroke-width="1.5" opacity="0.25"/>
  <line x1="245" y1="205" x2="245" y2="255" stroke="#242424" stroke-width="1.5" opacity="0.25"/>
  <!-- Hinge at back -->
  <circle cx="280" cy="255" r="8" fill="#3a3a3a"/>
  <circle cx="280" cy="255" r="3" fill="#242424"/>
  <!-- Cable -->
  <path d="M200 300 Q 200 330 220 340 Q 260 360 280 340" fill="none" stroke="#3a3a3a" stroke-width="3" stroke-linecap="round"/>
  <!-- Top edge highlight -->
  <line x1="122" y1="170" x2="278" y2="200" stroke="#f5f5f5" stroke-width="1" opacity="0.2"/>
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f5f5f5" opacity="0.6">Pedale</text>
</svg>