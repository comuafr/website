<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#242424"/>
  <!-- Base platform -->
  <rect x="120" y="300" width="160" height="16" rx="3" fill="#3a3a3a"/>
  <!-- Pedestal / column -->
  <rect x="175" y="200" width="50" height="100" rx="2" fill="#3a3a3a"/>
  <!-- Pedestal flare top -->
  <path d="M160 200 L240 200 L225 210 L175 210 Z" fill="#3a3a3a"/>
  <!-- Pedestal flare bottom -->
  <path d="M150 295 L250 295 L240 300 L160 300 Z" fill="#3a3a3a"/>
  <!-- Wheel head (top disc) -->
  <ellipse cx="200" cy="190" rx="80" ry="16" fill="#e0544d"/>
  <!-- Wheel head highlight -->
  <ellipse cx="200" cy="188" rx="60" ry="10" fill="none" stroke="#f5f5f5" stroke-width="0.5" opacity="0.3"/>
  <!-- Splash pan ring -->
  <ellipse cx="200" cy="195" rx="90" ry="18" fill="none" stroke="#e0544d" stroke-width="2" opacity="0.4"/>
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f5f5f5" opacity="0.6">Tour Louise</text>
</svg>