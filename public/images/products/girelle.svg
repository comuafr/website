<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#242424"/>
  <!-- Outer disc -->
  <circle cx="200" cy="190" r="110" fill="#e0544d"/>
  <!-- Inner ring -->
  <circle cx="200" cy="190" r="95" fill="none" stroke="#242424" stroke-width="1.5" opacity="0.4"/>
  <!-- Surface texture — concentric rings -->
  <circle cx="200" cy="190" r="80" fill="none" stroke="#242424" stroke-width="0.8" opacity="0.2"/>
  <circle cx="200" cy="190" r="60" fill="none" stroke="#242424" stroke-width="0.8" opacity="0.2"/>
  <circle cx="200" cy="190" r="40" fill="none" stroke="#242424" stroke-width="0.8" opacity="0.2"/>
  <circle cx="200" cy="190" r="20" fill="none" stroke="#242424" stroke-width="0.8" opacity="0.2"/>
  <!-- Center pin hole -->
  <circle cx="200" cy="190" r="5" fill="#3a3a3a"/>
  <circle cx="200" cy="190" r="2" fill="#242424"/>
  <!-- Subtle highlight arc -->
  <path d="M130 140 A 90 90 0 0 1 250 135" fill="none" stroke="#f5f5f5" stroke-width="1" opacity="0.15"/>
  <!-- Shadow ellipse beneath -->
  <ellipse cx="200" cy="310" rx="100" ry="10" fill="#3a3a3a" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f5f5f5" opacity="0.6">Girelle</text>
</svg>