<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#242424"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="300" rx="120" ry="12" fill="#3a3a3a" opacity="0.3"/>
  <!-- Outer ring of basin (top-down view) -->
  <circle cx="200" cy="190" r="120" fill="#e0544d"/>
  <!-- Inner basin area -->
  <circle cx="200" cy="190" r="95" fill="#3a3a3a"/>
  <!-- Basin floor -->
  <circle cx="200" cy="190" r="85" fill="#242424" opacity="0.6"/>
  <!-- Drain hole in center -->
  <circle cx="200" cy="190" r="8" fill="#3a3a3a"/>
  <circle cx="200" cy="190" r="3" fill="#242424"/>
  <!-- Rim highlight -->
  <path d="M100 155 A 120 120 0 0 1 280 140" fill="none" stroke="#f5f5f5" stroke-width="1.5" opacity="0.15"/>
  <!-- Inner rim shadow -->
  <path d="M120 230 A 95 95 0 0 1 280 230" fill="none" stroke="#f5f5f5" stroke-width="0.8" opacity="0.08"/>
  <!-- Spout notch -->
  <path d="M80 185 L90 180 L90 200 L80 195 Z" fill="#e0544d"/>
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#f5f5f5" opacity="0.6">Bac</text>
</svg>